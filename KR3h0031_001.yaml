front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0031_WYG_001-1a, image: WYG0813/WYG0813-0555c.png}
body:
  text: 續書譜宋姜䕫撰總論真行草書之法其源出于蟲篆八分飛白章草等圓徑古淡則出于蟲篆㸃畫波發則出于八分轉換向背則出于飛白簡便痛快則出于章草然而真草與行各有體製歐陽率更顔平原輩以真為草李雍李西臺輩以行為真亦以古人有専工正書者有専工草書者有専工行書者信乎其不䏻兼美也或云草書千字不抵行書十字行書十字不抵真書一字意以為草至易而真至難豈真知書者哉大抵下筆之際盡倣古人則少神氣専務遒徑則俗病不除所貴熟習兼通心手相應斯為妙矣白雲先生歐陽率更書訣亦䏻言其梗概孫過庭論之又詳皆可參稽之真書真書以平正為善此世俗之論唐人之失也古今真書之妙無出鍾元常其次則王逸少今觀二家之書皆瀟灑縱橫何拘平正良由唐人以書判取士而士大夫字書類有科舉習氣顔魯公作干祿字書是其證也矧歐虞顔栁前後相望故唐人下筆應規入矩無復魏晉飄逸之氣且字之長短小大斜正疏密天然不齊孰䏻一之謂如東字之長西字之短口字之小體字之大朋字之斜黨字之正千字之疏萬字之密畫多者宜瘦畫少者宜肥魏晉書法之髙良由各盡字之真態不以私意參之耳或者専喜方正極意歐顔或者惟務勻圓専師虞永或謂體須稍匾則自然平正此又有徐㑹稽之病或云欲其蕭散則自不塵俗此又有王子敬之風豈足以盡書法之美哉真書用筆自有八法吾嘗採古人字列之以為圖今略言其指㸃者字之眉目全藉顧盼精神有向有背隨字異形橫直畫者字之骨體欲其堅正勻淨有起有止所貴長短合宜結束堅實丿音乀音瞥拂者字之手足伸縮異度變化多端要如魚翼鳥翅有翩翩自得之狀挑剔者字之步履欲其沈實晉人挑剔或帶斜拂或橫引向外至顔栁始正鋒為之正鋒則無飄逸之氣轉折者方圓之法真多用折草多用轉折欲少駐駐則有力轉欲不滯滯則不遒然而真以轉而後遒草以折而後徑不可不知也懸針者筆欲極正自上而下端若引繩若垂而復縮謂之垂露翟伯夀問于米老曰書法當如何米老曰無垂不縮無往不收此必至精至熟然後䏻之古人遺墨得其一㸃一畫皆昭然絶異者以其用筆精妙故也大令以來用筆多失一字之間長短相補斜正相拄肥瘦相混求妍媚于成體之後至于今世尤甚焉用筆用筆不欲太肥肥則形濁又不欲太瘦瘦則形枯不欲多露鋒芒則意不持重不欲深藏圭角則體不精神不欲上小下大不欲左低右髙不欲前多後少歐陽率更結體雖太拘而用筆特備衆美雖少枯而翰墨灑落追蹤鍾王來者不䏻及也顔栁結體既異古人用筆復溺一偏豫評二家為書法之一變數百年間人爭效之字畫剛徑髙眀固不為無助而魏晉風軌掃地矣然栁氏大字偏傍清徑可喜更為竒妙近世亦有倣之者則俗濁不除不足觀故知與其太肥不若瘦硬也草書草書之體如人坐卧行立揖遜忿爭乘舟躍馬歌舞劈踊一切變態非苟然者又一字之體率有多變有起有應如此起者當如此應各有義理王右軍書羲之字當字得字深字慰字最多多至數十字無有同者而未嘗不同也可謂所欲不踰矩矣大凡學草書先當取法張芝皇象索靖等章草則結體平正下筆有源然後倣王右軍申之以變化鼓之以竒崛若泛學諸家則字有工拙筆多失誤當連者反斷當斷者反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反為新竒自大令以來已如此矣况今世哉然而襟韻不髙記憶雖多莫湔塵俗若使風神蕭散下筆便當過人自唐以前多是獨草不過兩字屬連纍數十字而不斷號曰連綿逰絲此雖出于古人不足為竒更成大病古人作草如今人作真何嘗苟且其相連處特是引帶嘗考其字是㸃畫處皆重非㸃畫處偶相引帶其筆皆輕雖復變化多端未嘗亂其法度張顛懷素最號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法至是又一變矣流至于今不可復觀唐太宗云行行若縈春蚓字字如綰秋蛇惡無骨也大抵用筆有緩有急有有鋒有無鋒有承接上文有牽引下字乍徐還疾忽往復收緩以倣古急以出竒有鋒以耀其精神無鋒以含其氣味橫斜曲直鉤環盤紆皆以勢為主然不欲相帶帶則近俗橫畫不欲太長長則轉換遲直畫不欲太多多則神癡以捺代乀以發代辵辵亦以捺代之唯丿則間用之意盡則用懸針意未盡須再生筆意不若用垂露耳用筆用筆如折叉股如屋漏痕如錐畫沙如壁坼此皆後人之論折叉股者欲其屈折圓而有力屋漏痕者欲其無起止之跡錐畫沙者欲其勻而藏鋒壁坼者欲其無布置之巧然皆不必若是筆正則鋒藏筆偃則鋒出一起一倒一晦一明而神竒出焉常欲筆鋒在畫中則左右皆無病矣故一㸃一畫皆有三轉一波一拂皆有三折一丿又有數樣一㸃者欲與畫相應兩㸃者欲自相應三㸃者必一㸃起一㸃帶一㸃應四㸃者一起兩帶一應筆陳圖云若平直相似狀如笇子便不是書又如囗音當行草時尤當泯其稜角以寬閒圓美為佳心正則筆正意在筆先字居心後皆名言也故不得中行與其工也寧拙與其弱也寧徑與其鈍也寧速然極須淘洗俗姿則妙處自見矣大要執之欲緊運之欲活不可以指運筆當以腕運筆執之在手手不主運運之在腕腕不知執又作字者亦須略考篆文須知㸃畫來歷先後如左右之不同刺刺之相異王之與玊示之與衣以至秦奉泰春形同理殊得其源本斯不浮矣孫氏有執使轉用之法執謂深淺長短使謂縱橫牽掣轉謂鉤環盤紆用謂㸃畫向背豈偶然哉用墨作楷墨欲乾然不可太燥行草則燥潤相雜潤以取妍燥以取險墨濃則筆滯燥則筆枯亦不可不知也筆欲鋒長徑而圓長則含墨可以運動徑則有力圓則妍美豫嘗評世有三物用不同而理相似良弓引之則緩來舍之則急往世俗謂之揭箭好刀按之則曲舍之則徑直如初世俗謂之回性筆鋒亦欲如此若一引之後己曲不復挺又安䏻如人意耶故長而不徑不如勿長徑而不圓不如不徑蓋紙筆墨皆書法之助也行書嘗考魏晉行書自有一體與草書不同大率變真以便于揮運而已草出于章行出于真雖曰行書各有定體縱復晉代諸賢亦苦不相逺蘭亭記及右軍諸帖第一謝安石大令諸帖次之顔栁蘇米亦後世可觀者大要以筆老為貴少有失誤亦可輝映所貴乎穠纎間出血脈相連筋骨老健風神灑落姿態備具真有真之態度行有行之態度草有草之態度必須博習可以兼通臨摹摹書最易唐太宗云卧王濛于紙上坐徐偃于筆下可以嗤蕭子雲唯初學書者不得不摹亦以節度其手易于成就皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以摹臨其次雙鉤蠟本須精意摹搨乃不失位置之美耳臨書易失古人位置而多得古人筆意摹書易得古人位置而多失古人筆意臨書易進摹書易忘經意與不經意也夫臨摹之際毫髮失真則神情頓異所貴詳謹世所有蘭亭何翅數百本而定武為最佳然定武本有數樣今取諸本參之其位置長短大小無不同而肥瘠剛柔工拙要妙之處如人之面無有同者以此知定武雖石刻又未必得真蹟之風神矣字書全以風神超邁為主刻之金石其可苟哉雙鉤之法須得墨暈不出字外或郭填其內或朱其背正得肥瘦之本體雖然尤貴于瘦使工人刻之又從而刮治之則瘦者亦變為肥矣或云雙鉤時須倒置之則亦無容私意于其間誠使下本眀上紙薄倒鉤何害若下本晦上紙厚却須䏻書者為之發其筆意可也夫鋒鋩圭角字之精神大抵雙鉤多失此又須朱其背時稍致意焉書丹筆得墨則瘦得朱則肥故書丹尤以瘦為竒而圓熟美潤常有餘燥徑蒼古常不足朱使然也欲刻者不失真未有若書丹者然書時盤薄不無少勞韋仲將升髙書凌雲臺榜下則鬚髮已白藝成而下斯之謂歟若鍾繇李雍又自刻之可謂癖矣情性藝之至未始不與精神通其說見于昌黎送髙間序孫過庭云一時而書有乖有合合則流媚乖則凋踈神怡務閒一合也感物循知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢曲二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也乖合之際優劣互差又云消息多方性情不一乍剛柔以合體忽勞逸而分驅或恬憺雍容內涵筋骨或折挫槎枿外曜鋒芒察之者尚精擬之者貴似至有未悟淹留偏追徑疾不䏻迅速翻效遲重夫徑速者超逸之機遲留者賞㑹之致將反其速行臻㑹美之方専溺于遲終爽絶倫之妙䏻速不速所謂淹留因遲就遲詎名賞㑹非其心閒手敏難以兼通者焉假令衆妙攸歸務存骨氣骨氣存矣遒潤加之亦猶枝幹扶疏凌霜雪而彌徑花葉鮮茂與雲日而相輝如其骨力偏多遒麗蓋少則枯槎架險巨石當路雖妍媚云闕而體質存焉若遒麗居優骨氣將劣譬如芳林落葉空照灼而無依蘭沼漂萍徒青翠而奚託是知偏工易就盡善難求雖學宗一家而變成多體莫不隨其性欲便以為姿質直者則徑挺不遒剛狠者又倔强無潤矜斂者弊于拘束脫易者失于規矩溫柔者傷于軟緩躁勇者過于剽迫狐疑者溺于滯澀遲重者終于拙鈍輕瑣者染于俗吏斯皆獨行之士偏玩所乖必䏻旁通㸃畫之情博究始終之理鎔鑄蟲篆陶鈞草隸至若數畫並施其形各異衆㸃齊列為體互乖一㸃成一字之規一字乃終篇之準違而不犯和而不同留不常遲遣不常疾帶燥方潤將濃遂枯泯規矩于方圓遁繩鉤之曲直乍顯乍晦若行若藏窮變態于毫端合情調于紙上無間心手忘懷楷則自可背羲獻而無失違鍾張而尚工其言盡善故具載血脈字有藏鋒出鋒之異粲然盈楮欲其首尾相應上下相接為佳後學之士隨所記憶圖寫其形未䏻涵容皆支離而不相貫穿黃庭小楷與樂毅論不同東方畫讃又與蘭亭殊指一時下筆各有其勢固應爾也豫嘗歷觀古之名書無不㸃畫振動如見其揮運之時山谷云字中有筆如禪句中有眼豈欺我哉燥潤見用筆條徑媚見情性條方圓方圓者真草之體用真貴方草貴圓方者參之以圓圓者參之以方斯為妙矣然而方圓曲直不可顯露直須涵泳一出于自然如草書尤忌橫直分眀橫直多則字有積薪束葦之狀而無蕭散之氣時時一出斯為妙矣向背向背者如人之顧盼指畫相揖相背發于左者應于右起于上者伏于下大要㸃畫之間施設各有情理求之古人惟王右軍為妙位置假如立人挑土田王衣示一切偏旁皆須令狹長則右有餘地矣在右者亦然不可太密太巧太密太巧是唐人之病也假如口字在左者皆須與上齊嗚呼喉嚨等是也在右者皆欲與下齊和扣等是也又如宀須令覆其下走辵皆須能承其上審量其輕重使相負荷計其大小使相副稱為善踈密書以踈為風神密為老氣如佳之四橫川之三直魚之四㸃畫之九畫必須下筆徑淨踈密停勻為佳當疏不疏反成寒乞當密不密必至凋疏風神風神者一須人品髙二須師法古三須紙筆佳四須險徑五須髙眀六須潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之臞肥者如貴逰之子徑者如武夫媚者如美女欹斜如醉仙端楷如賢士遲速遲以取妍速以取徑必先䏻速然後為遲若素不䏻速而専事遲則無神氣若専事速又多失勢筆勢下筆之初有搭鋒者有折鋒者其一字之體定于初下筆凡作字第一字多是折鋒第二三字承上筆勢多是搭鋒若一字之間右邉多是折鋒應其左故也又有平起者如𨽻畫藏鋒者如篆畫大要折搭多精神平藏善含蓄兼之則妙矣續書譜
