front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0031_WYG_001-1a, image: WYG0813/WYG0813-0555c.png}
body:
  text: 續書譜宋姜䕫撰總論真行草書之法其源出扵蟲篆八分飛白章草等圓勁古淡則出扵蟲篆㸃畫波發則出扵八分轉換向背則出扵飛白簡便痛快則出扵章草然而真草與行各有體製歐陽率更顔平原輩以真為草李邕李西臺輩以行為真亦以古人有専工正書者有専工草書者有専工行書者信乎其不䏻兼美也或云草書千字不抵行書十字行書十字不抵真書一字意以為草至易而真至難豈真知書者哉大抵下筆之際盡倣古人則少神氣専務遒勁則俗病不除所貴熟習兼通心手相應斯為妙矣白雲先生歐陽率更書訣亦䏻言其梗概孫過庭論之又詳皆可參稽之真書真書以平正為善此世俗之論唐人之失也古今真書之妙無出鍾元常其次則王逸少今觀二家之書皆瀟洒縱横何拘平正良由唐人以書判取士而士大夫字書類有科舉習氣顔魯公作干禄字書是其證也矧歐虞顔栁前後相望故唐人下筆應規入矩無復魏晉飄逸之氣且字之長短小大斜正疎宻天然不齊孰䏻一之謂如東字之長西字之短口字之小體字之大朋字之斜黨字之正千字之疎萬字之宻畫多者宜痩畫少者宜肥魏晉書法之髙良由各盡字之真態不以私意參之耳或者専喜方正極意歐顔或者惟務匀圓専師虞永或謂體須稍匾則自然平正此又有徐㑹稽之病或云欲其蕭散則自不塵俗此又有王子敬之風豈足以盡書法之美哉真書用筆自有八法吾嘗採古人字列之以為圖今略言其指㸃者字之眉目全藉顧盼精神有向有背隨字異形横直畫者字之骨體欲其堅正匀浄有起有止所貴長短合宜結束堅實丿音乀音瞥拂者字之手足伸縮異度變化多端要如魚翼鳥翅有翩翩自得之状挑剔者字之步履欲其沈實晉人挑剔或帶斜拂或横引向外至顔栁始正鋒為之正鋒則無飄逸之氣轉折者方圓之法真多用折草多用轉折欲少駐駐則有力轉欲不滯滯則不遒然而真以轉而後遒草以折而後勁不可不知也懸針者筆欲極正自上而下端若引繩若垂而復縮謂之垂露翟伯夀問扵米老曰書法當如何米老曰無垂不縮無往不收此必至精至熟然後䏻之古人遺墨得其一㸃一畫皆昭然絶異者以其用筆精妙故也大令以来用筆多失一字之間長短相補斜正相拄肥痩相混求妍媚扵成體之後至扵今世尤甚焉用筆用筆不欲太肥肥則形濁又不欲太痩痩則形枯不欲多露鋒芒則意不持重不欲深蔵圭角則體不精神不欲上小下大不欲左低右髙不欲前多後少歐陽率更結體雖太拘而用筆特備衆美雖少枯而翰墨灑落追蹤鍾王来者不䏻及也顔栁結體既異古人用筆復溺一偏予評二家為書法之一變數百年間人争效之字畫剛勁髙眀固不為無助而魏晉風軌掃地矣然栁氏大字偏傍清勁可喜更為竒妙近世亦有倣之者則俗濁不除不足觀故知與其太肥不若痩硬也草書草書之體如人坐卧行立揖遜忿争乗舟躍馬歌舞擗踊一切變態非苟然者又一字之體率有多變有起有應如此起者當如此應各有義理王右軍書羲之字當字得字深字慰字最多多至數十字無有同者而未嘗不同也可謂所欲不踰矩矣大凡學草書先當取法張芝皇象索靖等章草則結體平正下筆有源然後倣王右軍申之以變化鼓之以竒崛若泛學諸家則字有工拙筆多失誤當連者反㫁當㫁者反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反為新竒自大令以来已如此矣况今世哉然而襟韻不髙記憶雖多莫湔塵俗若使風神蕭散下筆便當過人自唐以前多是獨草不過兩字屬連累數十字而不㫁號曰連綿逰絲此雖出扵古人不足為竒更成大病古人作草如今人作真何嘗苟且其相連處特是引帶嘗攷其字是㸃畫處皆重非㸃畫處偶相引帶其筆皆輕雖復變化多端未嘗亂其法度張顛懐素最號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法至是又一變矣流至扵今不可復觀唐太宗云行行若縈春蚓字字如綰秋蛇惡無骨也大抵用筆有緩有急有有鋒有無鋒有承接上文有牽引下字乍徐還疾忽往復收緩以倣古急以出竒有鋒以燿其精神無鋒以含其氣味横斜曲直鉤環盤紆皆以勢為主然不欲相帶帶則近俗横畫不欲太長長則轉換遲直畫不欲太多多則神癡以捺代乀以發代辵辵亦以捺代之唯丿則間用之意盡則用懸針意未盡須再生筆意不若用垂露耳用筆用筆如折釵股如屋漏痕如錐畫沙如壁坼此皆後人之論折釵股者欲其屈折圓而有力屋漏痕者欲其無起止之跡錐畫沙者欲其匀而蔵鋒壁坼者欲其無布置之巧然皆不必若是筆正則鋒藏筆偃則鋒出一起一倒一晦一明而神竒出焉常欲筆鋒在畫中則左右皆無病矣故一㸃一畫皆有三轉一波一拂皆有三折一丿又有數樣一㸃者欲與畫相應兩㸃者欲自相應三㸃者必一㸃起一㸃帶一㸃應四㸃者一起兩帶一應筆陣圖云若平直相似状如笇子便不是書又如囗音當行草時尤當泯其稜角以寛閒圓美為佳心正則筆正意在筆先字居心後皆名言也故不得中行與其工也寜拙與其弱也寜勁與其鈍也寜速然極須淘洗俗姿則妙處自見矣大要執之欲𦂳運之欲活不可以指運筆當以腕運筆執之在手手不主運運之在腕腕不知執又作字者亦須略考篆文須知㸃畫来歴先後如左右之不同刺刺之相異王之與玊示之與衣以至秦奉泰春形同理殊得其源本斯不浮矣孫氏有執使轉用之法執謂深淺長短使謂縱横牽掣轉謂鉤環盤紆用謂㸃畫向背豈偶然哉用墨作楷墨欲乾然不可太燥行草則燥潤相雜潤以取妍燥以取險墨濃則筆滯燥則筆枯亦不可不知也筆欲鋒長勁而圓長則含墨可以運動勁則有力圓則妍美予嘗評世有三物用不同而理相似良弓引之則緩來舍之則急往世俗謂之掲箭好刀按之則曲舍之則勁直如初世俗謂之回性筆鋒亦欲如此若一引之後己曲不復挺又安䏻如人意耶故長而不勁不如勿長勁而不圓不如不勁盖紙筆墨皆書法之助也行書嘗考魏晉行書自有一體與草書不同大率變真以便扵揮運而已草出扵章行出扵真雖曰行書各有定體縱復晉代諸賢亦苦不相逺蘭亭記及右軍諸帖第一謝安石大令諸帖次之顔栁蘇米亦後世可觀者大要以筆老為貴少有失誤亦可輝映所貴乎穠纎間出血脈相連筋骨老健風神灑落姿態備具真有真之態度行有行之態度草有草之態度必須博習可以兼通臨摹摹書最易唐太宗云卧王濛扵紙上坐徐偃扵筆下可以嗤蕭子雲唯初學書者不得不摹亦以節度其手易扵成就皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以摹臨其次雙鉤蠟本須精意摹搨迺不失位置之美耳臨書易失古人位置而多得古人筆意摹書易得古人位置而多失古人筆意臨書易進摹書易忘經意與不經意也夫臨摹之際毫髪失真則神情頓異所貴詳謹世所有蘭亭何翅數百本而定武為最佳然定武本有數樣今取諸本參之其位置長短大小無不同而肥瘠剛柔工拙要妙之處如人之面無有同者以此知定武雖石刻又未必得真蹟之風神矣字書全以風神超邁為主刻之金石其可苟哉雙鉤之法須得墨暈不出字外或郭填其内或朱其背正得肥痩之本體雖然尤貴扵痩使工人刻之又從而刮治之則痩者亦變為肥矣或云雙鉤時須倒置之則亦無容私意扵其間誠使下本眀上紙薄倒鉤何害若下本晦上紙厚却須䏻書者為之發其筆意可也夫鋒鋩圭角字之精神大抵雙鉤多失此又須朱其背時稍致意焉書丹筆得墨則痩得朱則肥故書丹尤以痩為竒而圓熟美潤常有餘燥勁蒼古常不足朱使然也欲刻者不失真未有若書丹者然書時盤薄不無少勞韋仲将升髙書凌雲臺榜下則鬚髪已白藝成而下斯之謂歟若鍾繇李邕又自刻之可謂癖矣情性藝之至未始不與精神通其説見扵昌黎送髙閑序孫過庭云一時而書有乖有合合則流媚乖則凋踈神怡務閒一合也感物循知二合也時和氣潤三合也紙墨相發四合也偶然欲書五合也心遽體留一乖也意違勢曲二乖也風燥日炎三乖也紙墨不稱四乖也情怠手闌五乖也乖合之際優劣互差又云消息多方性情不一乍剛柔以合體忽勞逸而分驅或恬憺雍容内涵筋骨或折挫槎枿外曜鋒芒察之者尚精擬之者貴似至有未悟淹留偏追勁疾不䏻迅速翻效遲重夫勁速者超逸之機遲留者賞㑹之致将反其速行臻㑹美之方専溺扵遲終爽絶倫之妙䏻速不速所謂淹留因遲就遲詎名賞㑹非其心閒手敏難以兼通者焉假令衆妙攸歸務存骨氣骨氣存矣遒潤加之亦猶枝幹扶疎凌霜雪而彌勁花葉鮮茂與雲日而相輝如其骨力偏多遒麗盖少則枯槎架險巨石當路雖妍媚云闕而體質存焉若遒麗居優骨氣将劣譬如芳林落葉空照灼而無依蘭沼漂萍徒青翠而奚託是知偏工易就盡善難求雖學宗一家而變成多體莫不隨其性欲便以為姿質直者則徑挺不遒剛狠者又倔强無潤矜斂者弊扵拘束脱易者失扵規矩温柔者傷扵軟緩躁勇者過扵剽迫狐疑者溺扵滯澁遲重者終扵拙鈍輕瑣者染扵俗吏斯皆獨行之士偏翫所乖必䏻旁通㸃畫之情博究始終之理鎔鑄蟲篆陶鈞草隸至若數畫並施其形各異衆㸃齊列為體互乖一㸃成一字之䂓一字乃終篇之準違而不犯和而不同留不常遲遣不常疾帶燥方潤将濃遂枯泯規矩扵方圓遁繩鉤之曲直乍顯乍晦若行若蔵窮變態扵毫端合情調扵紙上無間心手忘懐楷則自可背羲獻而無失違鍾張而尚工其言盡善故具載血脈字有蔵鋒出鋒之異粲然盈楮欲其首尾相應上下相接為佳後學之士隨所記憶圖寫其形未䏻涵容皆支離而不相貫穿黄庭小楷與樂毅論不同東方畫讃又與蘭亭殊指一時下筆各有其勢固應爾也予嘗歴觀古之名書無不㸃畫振動如見其揮運之時山谷云字中有筆如禪句中有眼豈欺我哉燥潤見用筆條勁媚見情性條方圓方圓者真草之體用真貴方草貴圓方者參之以圓圓者參之以方斯為妙矣然而方圓曲直不可顯露直須涵泳一出扵自然如草書尤忌横直分眀横直多則字有積薪束葦之状而無蕭散之氣時時一出斯為妙矣向背向背者如人之顧盼指畫相揖相背發扵左者應扵右起扵上者伏扵下大要㸃畫之間施設各有情理求之古人惟王右軍為妙位置假如立人挑土田王衣示一切偏旁皆須令狭長則右有餘地矣在右者亦然不可太宻太巧太宻太巧是唐人之病也假如口字在左者皆須與上齊嗚呼喉嚨等是也在右者皆欲與下齊和扣等是也又如宀須令覆其下走辵皆須能承其上審量其輕重使相負荷計其大小使相副稱為善踈宻書以踈為風神宻為老氣如佳之四横川之三直魚之四㸃畫之九畫必須下筆勁浄踈宻停匀為佳當疎不疎反成寒乞當宻不宻必至凋疎風神風神者一須人品髙二須師法古三須紙筆佳四須險勁五須髙眀六須潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒痩者如山澤之臞肥者如貴逰之子勁者如武夫媚者如美女欹斜如醉僊端楷如賢士遲速遲以取妍速以取勁必先䏻速然後為遲若素不䏻速而専事遲則無神氣若専事速又多失勢筆勢下筆之初有搭鋒者有折鋒者其一字之體定扵初下筆凡作字第一字多是折鋒第二三字承上筆勢多是搭鋒若一字之間右邉多是折鋒應其左故也又有平起者如𨽻畫蔵鋒者如篆畫大要折搭多精神平蔵善含蓄兼之則妙矣續書譜
