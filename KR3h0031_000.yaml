body:
  text: 續書譜藝術類一書畫之屬提要臣等謹案續書譜一卷宋薑夔撰夔有絳帖平已著録是編乃其論書之語曰續書譜者唐孫過庭先有書譜故也前有嘉定戊辰天台謝采伯序稱略識夔於友人處不知其能書也近閲其手墨數紙筆力遒徑波瀾老成又得其所著續書譜一卷議論精到三讀三嘆因為鋟木蓋夔撰是書至采伯始刋行也此本為王氏書苑補益所載凡二十則一曰總論二曰真書三曰用筆四曰草書五曰用筆六曰用墨七曰行書八曰臨摹九曰書丹十曰情性十一曰血脈十二曰燥潤十三曰徑媚十四曰方圓十五曰向背十六曰位置十七曰疏密十八曰風神十九曰遲速二十曰筆鋒其燥潤徑媚二則均有録無書燥潤下注曰見用筆條徑媚下注曰見情性條然燥潤之説實在用墨條中疑有舛誤又真書草書之後各有用筆一則而草書後之論用筆乃是八法並非論草疑亦有訛敬考欽定佩文齋書畫譜第七卷中全收是編臨摹以前八則次序相同臨摹以下則九曰方圓十曰向背十一曰位置十二曰疏密十三曰風神十四曰遲速十五曰筆勢十六曰情性十七曰血脈十八曰書丹先後小殊而燥潤徑媚二則則並無其目蓋所據之本稍有不同而其文則無所增損也書史會要曰趙必睪字伯暐宗室也官至奏院中丞善𨽻楷作續書譜辨妄以規薑夔之失案必睪之書今已佚不知其所規者何語然夔此譜自來為書家所重必睪獨持異論似恐未然殆世以其立説乖謬故棄而不傳歟乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀續書譜序薑夔字堯章番易布衣也自號為白石生好學無所不通嘗請于朝欲是正頌臺樂律以議不合而罷有大樂議琴瑟放鐃歌等書傳於世豫略識於一友人處知其為名士頗敬之不知其能書也近閲其手墨數紙運筆遒徑波瀾老成又得其所著續書譜一卷議論精到三讀三歎真擊書學之蒙者也夫自大學不明而小學盡廢遊心六藝者固已絶無堇有而堯章乃用志刻苦筆法入能品豫固恨其不遇於時又自恨向者不能盡知而不獲樞衣比面以請也因為鋟木以志吾過云嘉定戊辰天台謝采伯元若引
